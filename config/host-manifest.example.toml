lidar_model = "LDS-02"
camera_device = "/dev/REPLACE_CAMERA"
opencr_device = "/dev/REPLACE_OPENCR"
lidar_device = "/dev/REPLACE_LIDAR"
mic_alsa_device = "plughw:CARD=REPLACE_MIC,DEV=0"
speaker_alsa_device = "plughw:CARD=REPLACE_SPEAKER,DEV=0"
display = ":0"
xorg_vt = "vt1"
cmd_vel_topic = "auto"
cmd_vel_candidates = "/cmd_vel,/robot_a/cmd_vel,/robot_b/cmd_vel"
behavior_dry_run = true
behavior_max_duration = 1.5
behavior_motion_gap_s = 0.08
