mmproj_sha256 = "c6ba85508d82f42590e6eb77d5340369ab6fecf107a7561d809523d8aa5f3bfd"
context_size = 4096
gpu_layers = 999
wait_timeout_s = 180
runtime_log_dir = "/srv/tb3/ai/runtime_logs/tb3_multimodal_interaction"
dashboard_image = "tb3-ai-max-dashboard:latest"
dashboard_container = "tb3-ai-max-dashboard"

[server_pc]
repo_dir = "/srv/tb3/server-workspace/ros2_ws/src/tb3_multimodal_interaction"
compose_dir = "/srv/tb3/server-compose"
ros_workspace_dir = "/srv/tb3/server-workspace"
