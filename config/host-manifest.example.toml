turtlebot3_model = "burger"
lidar_model = "LDS-02"

[tb3]
repo_dir = "/srv/tb3/robot-workspace/ros2_ws/src/tb3_multimodal_interaction"
compose_dir = "/srv/tb3/robot-compose"
ros_workspace_dir = "/srv/tb3/robot-workspace"
