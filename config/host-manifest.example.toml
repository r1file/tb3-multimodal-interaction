tts_container = "tb3-tts"
asr_image = "ros-cui/turtlebot3:jazzy-asr"
tts_image = "ros-cui/turtlebot3:jazzy-tts"
sensevoice_model_dir = "/srv/tb3-models/SenseVoiceSmall"
