schema_version = 1

[release]
manifest_id = "REPLACE_WITH_MANIFEST_ID"
repository = "git@github.com:r1file/tb3-multimodal-interaction.git"
commit = "REPLACE_WITH_RELEASE_COMMIT"

[network]
ai_max_ip = "192.0.2.10"
server_pc_ip = "192.0.2.20"
tb3_ip = "192.0.2.30"
vlm_port = 18082
vlm_dashboard_port = 18181
server_dashboard_port = 8775
tb3_ui_port = 8765

[ros]
domain_id = 30
automatic_discovery_range = "SUBNET"
peer_port_start = 14910
peer_port_end = 14929
container_fastdds_profile = "/workspace/runtime_logs/tb3_multimodal_interaction/fastdds_initial_peers.xml"

[runtime]
ntp_required = true
log_retention_days = 14
log_retain_files = 20
startup_grace_s = 180
status_stale_s = 30
dashboard_timeout_s = 5
status_relay_interval_s = 2
robotis_base_image = "robotis/turtlebot3@sha256:c510fb503c71ef9bfbd8165e4e2bbcac8006d91c548aea246113c4fbe352ba4d"
ai_dashboard_base_image = "python@sha256:57cd7c3a7a273101a6485ba99423ee568157882804b1124b4dd04266317710de"
robotis_repository = "https://github.com/ROBOTIS-GIT/turtlebot3.git"
robotis_commit = "da785b7201d317e6e2a662e41bb3d3fd50ebd503"

[ai_max]
repo_dir = "/srv/tb3/ai/repo"
root_dir = "/srv/tb3/ai"
llama_cpp_dir = "/srv/tb3/ai/llama.cpp"
llama_server = "/srv/tb3/ai/llama.cpp/build/bin/llama-server"
